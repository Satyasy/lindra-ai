services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: lindra
      POSTGRES_PASSWORD: lindra_dev
      POSTGRES_DB: lindra_dev
    ports:
      - "5432:5432"
    volumes:
      - lindra_pgdata:/var/lib/postgresql/data
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
volumes:
  lindra_pgdata:
