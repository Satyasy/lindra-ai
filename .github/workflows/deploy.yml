# Deploy ke EC2 via SSM SendCommand — tanpa SSH/port 22/key statis.
# Butuh GitHub secrets: AWS_DEPLOY_ROLE_ARN & EC2_INSTANCE_ID (dari output terraform).
name: deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - "terraform/**"
      - "**.md"
      - ".github/**"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-3

      - name: Update server via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${{ github.sha }}" \
            --timeout-seconds 1800 \
            --parameters 'commands=["cd /opt/lindra/app && git pull --ff-only && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build app && docker image prune -f"]' \
            --query Command.CommandId --output text)
          echo "command: $CMD_ID"
          while :; do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query Status --output text)
            echo "status: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$CMD_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query StandardErrorContent --output text
                exit 1 ;;
            esac
            sleep 15
          done
